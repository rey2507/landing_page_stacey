<div class="max-w-5xl mx-auto px-4 pt-6">

    <!-- Main Nav Container -->
    <div class="glass rounded-full px-8 py-4 flex items-center justify-between shadow-lg border-white/40 transition-all duration-500" id="nav-container">

        <!-- Logo -->
        <a href="#" data-analytics="navbar_about" id="navbar_about" class="font-serif text-2xl tracking-[0.25em] text-pink-600">
            STACEY
        </a>


        <!-- Desktop Links (Hidden on small screens) -->
        <div class="hidden md:flex items-center gap-10 text-sm font-semibold text-pink-600">
            <a href="#about" data-analytics="navbar_about" class="nav-link hover:text-pink-800 transition" id="navbar_about">About</a>
            <a href="#gallery" data-analytics="navbar_gallery" class="nav-link hover:text-pink-800 transition" id="navbar_gallery">Gallery</a>
            <a href="#links" data-analytics="navbar_links" class="nav-link hover:text-pink-800 transition" id="navbar_links">Links</a>

        </div>

        <!-- Right Side Buttons -->
        <div class="flex items-center gap-2 md:gap-3">
            <a href="#links"
               data-analytics="navbar_links"
               class="hidden sm:inline-flex bg-pink-500 text-white rounded-full px-5 py-2.5 text-[10px] tracking-[0.2em] uppercase hover:bg-pink-600 transition shadow-sm"
               id="navbar_links_cta">
                Main Links
            </a>


            <!-- Mobile Menu Button (Only shows on phones) -->
            <button id="menuBtn" data-analytics="mobile_menu_open"
                    class="md:hidden w-11 h-11 rounded-full glass flex items-center justify-center text-pink-600">

                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
                    <path d="M4 7h14M4 12h14M4 17h14"/>
                </svg>
            </button>
        </div>

    </div>

    <!-- MOBILE MENU (Full Screen Overlay) -->
    <div id="mobileMenu"
         class="fixed inset-0 z-[100] glass opacity-0 pointer-events-none transition-all duration-500 md:hidden flex flex-col items-center justify-center text-center p-8 backdrop-blur-xl bg-white/60">
        
        <!-- Close Button for Mobile Menu -->
        <button id="closeMenuBtn" data-analytics="mobile_menu_close" class="absolute top-8 right-8 w-12 h-12 rounded-full glass flex items-center justify-center text-pink-600 shadow-lg">

            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>

        <!-- Menu Links -->
        <div class="flex flex-col gap-8 text-2xl font-serif tracking-widest text-pink-700">
            <a href="#about" data-analytics="mobile_nav_about" class="mobile-nav-link hover:text-pink-900 transition-all duration-300" id="mobile_nav_about">About</a>
            <a href="#gallery" data-analytics="mobile_nav_gallery" class="mobile-nav-link hover:text-pink-900 transition-all duration-300" id="mobile_nav_gallery">Gallery</a>
            <a href="#links" data-analytics="mobile_nav_links" class="mobile-nav-link hover:text-pink-900 transition-all duration-300" id="mobile_nav_links">Links</a>

        </div>

        <!-- Social/Bottom Text -->
        <div class="absolute bottom-12 text-pink-400 text-[10px] tracking-[0.4em] uppercase font-bold">
            Stacey — Premium Experience
        </div>
    </div>

</div>
